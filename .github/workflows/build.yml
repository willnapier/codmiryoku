name: Build ZMK firmware

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: zmkfirmware/zmk-build-arm:stable
    name: Build Totem firmware
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    
    - name: Cache west modules
      uses: actions/cache@v4
      env:
        cache-name: cache-zephyr-modules
      with:
        path: |
          modules/
          tools/
          zephyr/
          bootloader/
          zmk/
        key: ${{ runner.os }}-build-${{ env.cache-name }}-${{ hashFiles('config/west.yml') }}
        restore-keys: |
          ${{ runner.os }}-build-${{ env.cache-name }}-
          ${{ runner.os }}-build-
          ${{ runner.os }}-
    
    - name: West Init
      run: west init -l config
    
    - name: West Update
      run: west update
    
    - name: West Zephyr export
      run: west zephyr-export
    
    # ---- macOS/Cmd variant (default keymap: config/totem.keymap) ----
    - name: Build left half (macOS)
      run: west build --pristine -s zmk/app -b seeeduino_xiao_ble -- -DSHIELD=totem_left -DZMK_CONFIG="${GITHUB_WORKSPACE}/config"
    - name: Rename left firmware (macOS)
      run: cp build/zephyr/zmk.uf2 totem_macos_left.uf2
    - name: Build right half (macOS)
      run: west build --pristine -s zmk/app -b seeeduino_xiao_ble -- -DSHIELD=totem_right -DZMK_CONFIG="${GITHUB_WORKSPACE}/config"
    - name: Rename right firmware (macOS)
      run: cp build/zephyr/zmk.uf2 totem_macos_right.uf2

    # ---- Linux/Ctrl variant (override keymap: config/totem_linux.keymap) ----
    - name: Build left half (Linux)
      run: west build --pristine -s zmk/app -b seeeduino_xiao_ble -- -DSHIELD=totem_left -DKEYMAP_FILE="${GITHUB_WORKSPACE}/config/totem_linux.keymap" -DZMK_CONFIG="${GITHUB_WORKSPACE}/config"
    - name: Rename left firmware (Linux)
      run: cp build/zephyr/zmk.uf2 totem_linux_left.uf2
    - name: Build right half (Linux)
      run: west build --pristine -s zmk/app -b seeeduino_xiao_ble -- -DSHIELD=totem_right -DKEYMAP_FILE="${GITHUB_WORKSPACE}/config/totem_linux.keymap" -DZMK_CONFIG="${GITHUB_WORKSPACE}/config"
    - name: Rename right firmware (Linux)
      run: cp build/zephyr/zmk.uf2 totem_linux_right.uf2

    - name: Upload firmware
      uses: actions/upload-artifact@v4
      with:
        name: totem-firmware
        path: |
          totem_macos_left.uf2
          totem_macos_right.uf2
          totem_linux_left.uf2
          totem_linux_right.uf2
